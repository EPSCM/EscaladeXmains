<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClimbMaster PWA</title>
    <!-- Balises PWA de base -->
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Outfit:wght@400;900&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #cbd5e1;
            background-image: radial-gradient(#94a3b8 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .font-rock { font-family: 'Bangers', cursive; }
        .font-marker { font-family: 'Permanent Marker', cursive; }

        .wall-panel {
            background: #f1f5f9;
            border: 4px solid #1e293b;
            border-radius: 20px;
            box-shadow: 10px 10px 0px #1e293b;
        }

        .hold-grid-btn {
            background: #fff;
            border: 2px solid #1e293b;
            border-radius: 12px 5px 12px 5px;
            font-weight: 900;
            box-shadow: 0 4px 0 #1e293b;
        }
        .hold-grid-btn.selected {
            background: #0ea5e9;
            color: white;
            transform: scale(1.05) translateY(2px);
            box-shadow: 0 0px 0 #1e293b;
        }

        #submitBtn:disabled {
            background: #94a3b8 !important;
            border-bottom-color: #64748b !important;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .status-green { background: #4ade80; border: 3px solid #166534; }
        .status-orange { background: #fb923c; border: 3px solid #9a3412; }
        .status-yellow { background: #facc15; border: 3px solid #854d0e; }
        .status-red { background: #f87171; border: 3px solid #991b1b; }
    </style>
</head>
<body class="p-4 pb-36">

    <header class="text-center mb-6">
        <h1 class="text-5xl font-rock text-slate-800 uppercase">Climb Master</h1>
        <p class="text-[10px] font-black bg-red-600 text-white inline-block px-4 py-1 rounded-full mt-2">DÉPASSEMENT = ÉCHEC</p>
    </header>

    <main class="max-w-md mx-auto space-y-6">
        <!-- FORMULAIRE -->
        <section class="wall-panel p-5">
            <h2 id="formTitle" class="font-marker text-2xl text-sky-600 mb-4">🧗‍♂️ Nouveau Départ</h2>
            
            <div class="space-y-4">
                <div id="idFields" class="space-y-3">
                    <input type="text" id="studentName" placeholder="NOM DU GRIMPEUR" oninput="checkForm()" class="w-full p-3 border-3 border-slate-800 rounded-xl font-black uppercase">
                    <div class="flex gap-2">
                        <input type="number" id="routeNumber" placeholder="N°" oninput="checkForm()" class="w-1/4 p-3 border-3 border-slate-800 rounded-xl font-black">
                        <select id="routeColor" onchange="checkForm()" class="flex-1 p-3 border-3 border-slate-800 rounded-xl font-black bg-white uppercase text-xs">
                            <option value="">COULEUR</option>
                            <option>Blanc</option><option>Jaune</option><option>Orange</option>
                            <option>Rose</option><option>Vert</option><option>Bleu</option>
                            <option>Violet</option><option>Rouge</option><option>Noir</option>
                        </select>
                    </div>
                </div>

                <div class="bg-slate-800 text-white p-4 rounded-xl">
                    <label class="text-[10px] font-black text-sky-400 uppercase block mb-1">Cible Précise (Projet)</label>
                    <select id="projectHeight" onchange="checkForm()" class="w-full bg-transparent text-2xl font-rock outline-none">
                        <option value="">SÉLECTIONNER...</option>
                        <option>Sol</option><option>D1</option><option>D2</option><option>D3</option>
                        <option>D4</option><option>D5</option><option>D6</option><option>D7</option><option>D8</option><option>TOP</option>
                    </select>
                </div>

                <div class="grid grid-cols-5 gap-2" id="heightGrid"></div>

                <button onclick="saveResult()" id="submitBtn" disabled class="w-full bg-sky-500 text-white font-rock text-2xl p-4 rounded-xl border-b-8 border-sky-800">
                    VALIDER L'ESSAI
                </button>
            </div>
        </section>

        <div id="resultsList" class="space-y-4"></div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900 p-4 flex justify-between items-center z-50 border-t-4 border-slate-700">
        <button onclick="clearData()" class="text-[10px] font-black text-red-400 uppercase">Effacer session</button>
        <button onclick="generatePDF()" class="bg-emerald-500 text-white font-rock px-6 py-3 rounded-xl border-b-4 border-emerald-800">
            📄 EXPORTER PDF
        </button>
    </nav>

    <script>
        const HEIGHT_ORDER = ['Sol', 'D1', 'D2', 'D3', 'D4', 'D5', 'D6', 'D7', 'D8', 'TOP'];
        let selectedHeight = null;
        let attempts = JSON.parse(localStorage.getItem('climbMaster_pwa')) || [];
        let editingIndex = -1;

        const grid = document.getElementById('heightGrid');
        HEIGHT_ORDER.forEach(h => {
            const btn = document.createElement('button');
            btn.className = 'hold-grid-btn p-2 text-[10px]';
            btn.innerText = h;
            btn.onclick = () => {
                selectedHeight = h;
                document.querySelectorAll('.hold-grid-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                checkForm();
            };
            grid.appendChild(btn);
        });

        function checkForm() {
            const name = document.getElementById('studentName').value.trim();
            const route = document.getElementById('routeNumber').value;
            const color = document.getElementById('routeColor').value;
            const project = document.getElementById('projectHeight').value;
            
            const isIdOk = editingIndex !== -1 ? true : (name && route && color);
            const isClimbOk = project && selectedHeight;

            document.getElementById('submitBtn').disabled = !(isIdOk && isClimbOk);
        }

        function saveResult() {
            const proj = document.getElementById('projectHeight').value;
            if (editingIndex === -1) {
                const name = document.getElementById('studentName').value;
                const route = document.getElementById('routeNumber').value;
                const color = document.getElementById('routeColor').value;
                attempts.push({ name, route, color, p1: proj, h1: selectedHeight, p2: null, h2: null });
            } else {
                attempts[editingIndex].p2 = proj;
                attempts[editingIndex].h2 = selectedHeight;
                editingIndex = -1;
            }
            localStorage.setItem('climbMaster_pwa', JSON.stringify(attempts));
            resetForm();
            render();
        }

        function getStatus(data) {
            const v1 = data.h1 === data.p1;
            if (data.h2 === null) return { class: "status-pending", label: "Attente P2", icon: "🧗" };
            const v2 = data.h2 === data.p2;
            if (v1 && v2) return { class: "status-green", label: "Double Succès", icon: "🎯" };
            if (v1 && !v2) return { class: "status-orange", label: "P1 OK", icon: "⚖️" };
            if (!v1 && v2) return { class: "status-yellow", label: "P2 OK", icon: "🌟" };
            return { class: "status-red", label: "Échec total", icon: "🌋" };
        }

        function render() {
            const list = document.getElementById('resultsList');
            list.innerHTML = "";
            attempts.forEach((data, index) => {
                const status = getStatus(data);
                list.innerHTML += `
                    <div class="p-4 rounded-xl border-3 border-slate-800 ${status.class}">
                        <div class="flex justify-between items-start mb-2">
                            <div><h3 class="font-marker text-lg uppercase">${data.name}</h3><p class="text-[9px] font-black opacity-60 uppercase">${data.route} - ${data.color}</p></div>
                            <span class="text-xl">${status.icon}</span>
                        </div>
                        <div class="flex gap-2 text-[9px] font-black">
                            <div class="flex-1 bg-white/20 p-2 rounded">P1: ${data.h1} (${data.p1}) ${data.h1===data.p1?'✅':'❌'}</div>
                            <div class="flex-1 bg-white/20 p-2 rounded text-center">
                                ${data.h2 ? `P2: ${data.h2} (${data.p2}) ${data.h2===data.p2?'✅':'❌'}` : `<button onclick="startSecondPass(${index})" class="underline">GO P2</button>`}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function startSecondPass(index) {
            editingIndex = index;
            document.getElementById('formTitle').innerText = "🧗‍♂️ Passage 2 : " + attempts[index].name;
            document.getElementById('idFields').classList.add('hidden');
            document.getElementById('projectHeight').value = attempts[index].p1;
            window.scrollTo({top: 0, behavior: 'smooth'});
            checkForm();
        }

        function resetForm() {
            document.getElementById('studentName').value = "";
            document.getElementById('idFields').classList.remove('hidden');
            document.getElementById('formTitle').innerText = "🧗‍♂️ Nouveau Départ";
            selectedHeight = null;
            document.querySelectorAll('.hold-grid-btn').forEach(b => b.classList.remove('selected'));
            checkForm();
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("BILAN ESCALADE - CLIMB MASTER", 14, 20);
            const rows = attempts.map(a => [a.name, a.color, `P1:${a.p1}/H:${a.h1}`, a.p2?`P2:${a.p2}/H:${a.h2}`:'-', getStatus(a).label]);
            doc.autoTable({ head: [['Nom', 'Voie', 'Essai 1', 'Essai 2', 'Bilan']], body: rows, startY: 30 });
            doc.save("Bilan_Escalade.pdf");
        }

        function clearData() { if(confirm("Supprimer tout ?")) { localStorage.removeItem('climbMaster_pwa'); attempts = []; render(); } }
        render();
    </script>
</body>
</html>
